name: 가온교회 주일예배 슬라이드 생성

on:
  schedule:
    # 매주 토요일 11:00 UTC = 토요일 20:00 KST
    - cron: "0 11 * * 6"
  workflow_dispatch: # 수동 실행 가능

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install lxml google-auth google-auth-oauthlib google-api-python-client

      - name: Fetch worship data
        run: python3 scripts/fetch_worship.py

      - name: Generate PPT
        run: python3 scripts/generate_ppt.py

      - name: Setup Google credentials
        run: |
          mkdir -p .secrets
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > .secrets/google_credentials.json
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > .secrets/google_token.json

      - name: Upload to Google Drive & send email
        env:
          GMAIL_SENDER: gikimiad@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          OUTPUT=$(ls output/*.pptx | head -1)
          python3 scripts/upload_and_notify.py "$OUTPUT"

      - name: Save refreshed token
        if: always()
        run: |
          if [ -f .secrets/google_token.json ]; then
            echo "Token may have been refreshed. Update the GOOGLE_TOKEN_JSON secret if needed."
            cat .secrets/google_token.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('token expiry:', d.get('expiry','unknown'))"
          fi
